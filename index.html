<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiwa Trade Services | Premium Sourcing</title>
    <style>
        :root { 
            --primary: #001f5b; 
            --gold: linear-gradient(135deg, #b59410 0%, #ffecb3 50%, #b59410 100%); 
            --gold-solid: #b59410;
            --bg: #f8f9fa; 
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; background: var(--bg); color: #1d1d1f; padding-bottom: 120px;
        }

        header { 
            background: var(--primary); padding: 40px 20px; text-align: center;
            border-bottom: 5px solid var(--gold-solid);
        }

        .ats-logo {
            width: 70px; height: 70px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 22px; color: var(--primary);
            border: 3px solid var(--gold-solid); margin: 0 auto 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .brand-name { font-size: 28px; font-weight: 900; color: white; letter-spacing: 4px; margin-bottom: 20px; }

        #searchInput { 
            width: 85%; max-width: 500px; padding: 15px 25px; border-radius: 50px; 
            border: none; font-size: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* --- CATEGORY HUB TILES --- */
        .hub-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        .hub-tile {
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            font-weight: 800;
            color: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #eee;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hub-tile:hover {
            transform: translateY(-10px);
            border-color: var(--gold-solid);
            background: var(--primary);
            color: white;
        }

        /* --- PRODUCT DISPLAY --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 10px; }
        
        .back-btn {
            margin: 20px; padding: 10px 20px; border: none; background: var(--gold-solid);
            color: white; border-radius: 10px; cursor: pointer; font-weight: 700;
        }

        .sub-section { 
            margin: 20px auto; background: white; border-radius: 20px; padding: 20px 0;
            animation: fadeInUp 0.5s ease-out;
        }

        .sub-cat-header { 
            font-size: 22px; font-weight: 900; color: var(--primary); 
            margin-left: 30px; display: flex; align-items: center; gap: 15px;
        }
        .sub-cat-header::after { content: ""; height: 3px; background: var(--gold); flex-grow: 1; margin-right: 30px; }

        .horizontal-scroll { display: flex; overflow-x: auto; gap: 25px; padding: 20px 30px; }

        .card { 
            min-width: 260px; max-width: 260px; background: white; border-radius: 20px; 
            border: 1px solid #eee; flex-shrink: 0; overflow: hidden; transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .image-container { width: 100%; height: 240px; background: #fff; display: flex; align-items: center; justify-content: center; }
        .image-container img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .info { padding: 20px; text-align: center; }
        .price { font-size: 18px; font-weight: 900; color: var(--gold-solid); margin: 10px 0; }

        .btn-wa { 
            display: block; background: var(--primary); color: white; padding: 12px; 
            text-decoration: none; border-radius: 10px; font-weight: 800;
        }

        .bottom-nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 80%; max-width: 400px; background: var(--primary); padding: 15px; 
            border-radius: 50px; display: flex; justify-content: space-around; z-index: 2000;
        }
        .nav-item { color: white; text-decoration: none; font-weight: 700; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="ats-logo">ATS</div>
    <div class="brand-name">AIWA TRADE SERVICES</div>
    <input type="text" id="searchInput" onkeyup="searchTrigger()" placeholder="Search catalog...">
</header>

<div id="categoryHub" class="hub-container">
    <div class="hub-tile" onclick="setCategory('Clothing')">👕 Clothing</div>
    <div class="hub-tile" onclick="setCategory('Electronics')">🔌 Electronics</div>
    <div class="hub-tile" onclick="setCategory('Household')">🏠 Household</div>
    <div class="hub-tile" onclick="setCategory('Toys')">🧸 Toys</div>
</div>

<div id="productView" class="container hidden">
    <button class="back-btn" onclick="showHub()">← Back to Categories</button>
    <div id="productGrid"></div>
</div>

<div class="bottom-nav">
    <a href="https://wa.me/85259813744" class="nav-item">WHATSAPP</a>
    <a href="mailto:info@aiwatrade.com" class="nav-item">EMAIL</a>
</div>

<script>
const products = [
    { name: "Winter Hoodie", cat: "Clothing", sub: "Winter Wear", price: "Enquire", img: "Hood1.jpg" },
    { name: "Sports Tracksuit", cat: "Clothing", sub: "Sports", price: "Enquire", img: "STS1.jpg" },
    { name: "Display Fridge", cat: "Electronics", sub: "Fridges", price: "Enquire", img: "Dp1.jpg" },
    { name: "STM32 Microchip", cat: "Electronics", sub: "Chips", price: "Enquire", img: "Chip1.jpg" },
    { name: "Dressing Table", cat: "Household", sub: "Furniture", price: "¥8.80", img: "CS.jpg" },
    { name: "Winter Blanket", cat: "Household", sub: "Bedding", price: "Enquire", img: "CS.jpg" },
    { name: "Flying Car", cat: "Toys", sub: "Cars", price: "¥41.80", img: "FC1.jpg" },
    { name: "Nerf Gun", cat: "Toys", sub: "Guns", price: "¥41.80", img: "NG1.jpg" }
];

function showHub() {
    document.getElementById('categoryHub').classList.remove('hidden');
    document.getElementById('productView').classList.add('hidden');
}

function setCategory(cat) {
    document.getElementById('categoryHub').classList.add('hidden');
    document.getElementById('productView').classList.remove('hidden');
    renderProducts(cat);
}

function searchTrigger() {
    const val = document.getElementById('searchInput').value;
    if(val.length > 0) {
        document.getElementById('categoryHub').classList.add('hidden');
        document.getElementById('productView').classList.remove('hidden');
        renderProducts('All', val.toLowerCase());
    } else {
        showHub();
    }
}

function renderProducts(filterCat, searchVal = "") {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = "";

    let filtered = products.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(searchVal);
        const matchesCat = (filterCat === 'All' || p.cat === filterCat);
        return matchesSearch && matchesCat;
    });

    const groups = filtered.reduce((acc, p) => {
        if (!acc[p.sub]) acc[p.sub] = [];
        acc[p.sub].push(p);
        return acc;
    }, {});

    for (const sub in groups) {
        let section = document.createElement('div');
        section.className = 'sub-section';
        let html = `<div class="sub-cat-header">${sub}</div><div class="horizontal-scroll">`;
        
        groups[sub].forEach(p => {
            html += `
                <div class="card">
                    <div class="image-container"><img src="${p.img}" onerror="this.src='https://placehold.co/400x400/001f5b/ffffff?text=Aiwa'"></div>
                    <div class="info">
                        <div class="item-name">${p.name}</div>
                        <div class="price">${p.price}</div>
                        <a href="https://wa.me/85259813744" class="btn-wa">Inquire</a>
                    </div>
                </div>`;
        });
        html += `</div>`;
        section.innerHTML = html;
        grid.appendChild(section);
    }
}
</script>
</body>
</html>
