<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiwa Trade Services | Premium Sourcing</title>
    <style>
        :root { 
            --primary: #001f5b; 
            --gold-solid: #b59410;
            --bg: #f8f9fa; 
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; background: var(--bg); color: #333; padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* --- PREMIUM HEADER --- */
        header { 
            background: linear-gradient(180deg, var(--primary) 0%, #001030 100%); 
            padding: 100px 20px; text-align: center;
            border-bottom: 4px solid var(--gold-solid);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .ats-logo {
            width: 80px; height: 80px; background: var(--white); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 24px; color: var(--primary);
            border: 3px solid var(--gold-solid); margin: 0 auto 20px;
            transform: rotate(-5deg); transition: 0.5s;
        }
        .ats-logo:hover { transform: rotate(0deg) scale(1.1); }

        .brand-name { 
            font-size: 42px; font-weight: 800; color: white; letter-spacing: 6px; 
            text-transform: uppercase; margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        #searchInput { 
            width: 90%; max-width: 600px; padding: 22px 35px; border-radius: 15px; 
            border: none; font-size: 17px; background: rgba(255,255,255,0.95);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); transition: 0.3s;
        }
        #searchInput:focus { transform: scale(1.02); outline: 3px solid var(--gold-solid); }

       /* --- THE INTERACTIVE HUB --- */
    .hub-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        padding: 40px 20px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .hub-tile {
        position: relative;
        height: 280px; 
        border-radius: 30px;
        overflow: hidden;
        cursor: pointer;
        background: #ffffff;
        border: 1px solid rgba(0,0,0,0.05);
        box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .hub-content {
        position: relative;
        z-index: 2;
        text-align: center;
        width: 100%;
        padding: 20px;
        transition: 0.4s ease-in-out;
    }

    .hub-icon { font-size: 50px; margin-bottom: 10px; transition: 0.4s; }
    
    .hub-title { 
        font-size: 22px; 
        font-weight: 800; 
        color: #001f5b; /* Aiwa Navy */
        text-transform: uppercase; 
        letter-spacing: 2px;
        margin: 0;
    }

    /* THE SUBTEXT: Starts invisible and slightly lower */
    .hub-subtext {
        font-size: 14px;
        color: #666;
        margin-top: 15px;
        opacity: 0;
        max-height: 0;
        transition: all 0.4s ease;
        transform: translateY(10px);
    }

    /* HOVER TRIGGERS */
    .hub-tile:hover {
        transform: translateY(-10px);
        border-color: #b59410; /* Aiwa Gold */
        box-shadow: 0 20px 40px rgba(0,31,91,0.1);
    }

    .hub-tile:hover .hub-title { color: #b59410; }
    
    .hub-tile:hover .hub-subtext {
        opacity: 1;
        max-height: 80px;
        transform: translateY(0);
    }

    .hub-tile:hover .hub-icon { transform: scale(1.1); }

        /* --- PRODUCT GRID STYLES --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 40px; }
        .back-btn { 
            background: var(--primary); color: white; padding: 12px 30px; 
            border-radius: 10px; border: none; cursor: pointer; font-weight: 700;
            margin-bottom: 30px; transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold-solid); }

        .sub-section { background: white; border-radius: 25px; padding: 30px 0; margin-bottom: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); }
        .sub-cat-header { font-size: 22px; font-weight: 800; color: var(--primary); padding-left: 40px; margin-bottom: 20px; border-left: 6px solid var(--gold-solid); }

        .horizontal-scroll { display: flex; overflow-x: auto; gap: 25px; padding: 0 40px; scrollbar-width: none; }
        .card { min-width: 280px; background: white; border-radius: 20px; border: 1px solid #eee; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: var(--gold-solid); transform: scale(1.02); }

        .image-container { height: 250px; display: flex; align-items: center; justify-content: center; background: #fff; }
        .image-container img { max-width: 80%; max-height: 80%; object-fit: contain; }
        .info { padding: 25px; text-align: center; background: #fafafa; }
        .price { font-size: 20px; font-weight: 800; color: var(--gold-solid); margin-bottom: 15px; }
        .btn-wa { display: block; background: var(--primary); color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: 700; }

        .bottom-nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 80%; max-width: 400px; background: var(--primary); padding: 18px; 
            border-radius: 50px; display: flex; justify-content: space-around; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .nav-item { color: white; text-decoration: none; font-weight: 700; font-size: 14px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <div class="ats-logo">ATS</div>
        <div class="brand-name">Aiwa Trade Services</div>
        <input type="text" id="searchInput" onkeyup="searchTrigger()" placeholder="What are you sourcing today?">
    </div>
</header>

<div id="categoryHub" class="hub-container">
    
    <div class="hub-tile" onclick="setCategory('Clothing')">
        <div class="hub-content">
            <div class="hub-icon">👕</div>
            <div class="hub-title">Clothing</div>
            <div class="hub-subtext">Premium textiles and fashion manufacturing.</div>
        </div>
    </div>

    <div class="hub-tile" onclick="setCategory('Electronics')">
        <div class="hub-content">
            <div class="hub-icon">🔌</div>
            <div class="hub-title">Electronics</div>
            <div class="hub-subtext">Consumer tech, chips, and smart gadgets.</div>
        </div>
    </div>

    <div class="hub-tile" onclick="setCategory('Household')">
        <div class="hub-content">
            <div class="hub-icon">🏠</div>
            <div class="hub-title">Household</div>
            <div class="hub-subtext">Luxury furniture and essential appliances.</div>
        </div>
    </div>

    <div class="hub-tile" onclick="setCategory('Others')">
        <div class="hub-content">
            <div class="hub-icon">📦</div>
            <div class="hub-title">Others</div>
            <div class="hub-subtext">Custom sourcing for any niche product you need.</div>
        </div>
    </div>
    </div>

</div>

<div id="productView" class="container hidden">
    <button class="back-btn" onclick="showHub()">← Return to Showroom</button>
    <div id="productGrid"></div>
</div>

<div class="bottom-nav">
    <a href="https://wa.me/85259813744" class="nav-item">WhatsApp</a>
    <a href="mailto:info@aiwatrade.com" class="nav-item">Email Official</a>
</div>

</script>

</body>
</html>
