<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiwa Trade Services | Global Catalog</title>
    <style>
        :root { --primary: #001f5b; --gold: #b59410; --bg: #ffffff; --card-bg: #f9f9fb; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: #1d1d1f; padding-bottom: 100px; }
        
        header { background: white; padding: 20px; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .logo-container { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .logo-icon { width: 45px; height: 45px; background: linear-gradient(135deg, var(--primary) 0%, #003a7a 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,31,91,0.2); }
        .brand-name { font-size: 20px; font-weight: 800; color: var(--primary); margin: 0; }
        .brand-subtext { font-size: 10px; font-weight: 600; text-transform: uppercase; color: #86868b; margin: 0; }

        .search-box { width: 100%; max-width: 500px; position: relative; }
        #searchInput { width: 100%; padding: 12px 20px 12px 45px; border-radius: 20px; border: 1px solid #e5e5e5; background: #f5f5f7; font-size: 16px; outline: none; box-sizing: border-box; }
        .search-box::before { content: '🔍'; position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.4; }

        .filter-container { display: flex; justify-content: center; gap: 8px; padding: 15px; overflow-x: auto; background: white; border-bottom: 1px solid #eee; }
        .filter-btn { padding: 10px 20px; border: none; background: #f2f2f7; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 700; white-space: nowrap; }
        .filter-btn.active { background: var(--primary); color: white; }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .sub-cat-header { width: 100%; grid-column: 1 / -1; margin: 30px 0 15px 0; font-size: 18px; font-weight: 700; color: var(--primary); border-left: 4px solid var(--gold); padding-left: 10px; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; } }

        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; }
        .info { padding: 12px; flex-grow: 1; }
        .item-name { font-size: 14px; font-weight: 600; margin: 4px 0; height: 38px; overflow: hidden; }
        .price { font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; }
        
        .btn { display: block; padding: 8px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 700; text-align: center; margin-bottom: 5px; }
        .btn-wa { background: #25D366; color: white; }
        .btn-mail { background: var(--primary); color: white; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #eee; display: flex; padding: 12px 0; z-index: 1001; }
        .bar-link { text-decoration: none; color: #000; font-size: 12px; text-align: center; font-weight: 700; flex: 1; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <div class="logo-icon">
            <svg viewBox="0 0 100 100" style="width:100%; height:100%; padding:8px;"><path d="M50 10 L90 90 L10 90 Z" fill="none" stroke="white" stroke-width="8"/><path d="M50 35 L75 90 L25 90 Z" fill="var(--gold)"/></svg>
        </div>
        <div class="logo-text">
            <h1 class="brand-name">AIWA TRADE SERVICES</h1>
            <p class="brand-subtext">GLOBAL SOURCING & LOGISTICS</p>
        </div>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="runFilters()" placeholder="Search items...">
    </div>
</header>

<div class="filter-container">
    <button class="filter-btn active" onclick="setCategory('All', this)">All</button>
    <button class="filter-btn" onclick="setCategory('Electronics', this)">Electronics</button>
    <button class="filter-btn" onclick="setCategory('Household', this)">Household</button>
    <button class="filter-btn" onclick="setCategory('Clothing', this)">Clothing</button>
    <button class="filter-btn" onclick="setCategory('Toys', this)">Toys</button>
</div>

<div class="container">
    <div id="productGrid" class="grid"></div>
</div>

<div class="bottom-bar">
    <a href="mailto:mantillaservices@gmail.com" class="bar-link">✉️ Email Us</a>
    <a href="https://wa.me/85259813744" class="bar-link" style="color:#25D366; border-left: 1px solid #eee;">💬 WhatsApp</a>
</div>

<script>
const BUSINESS_EMAIL = "mantillaservices@gmail.com";
const BUSINESS_PHONE = "85259813744"; 
let currentCategory = 'All';

const products = [
    // --- ELECTRONICS ---
    { name: "Intel Core i7-13700K", cat: "Electronics", sub: "Chips", price: "Enquire", img: "https://via.placeholder.com/400?text=CPU+Chip" },
    { name: "Automatic SMT Pick & Place", cat: "Electronics", sub: "Machineries", price: "Enquire", img: "https://via.placeholder.com/400?text=Machinery" },
    { name: "Countertop Cooler SC21B", cat: "Electronics", sub: "Refrigeration", price: "Enquire", img: "https://via.placeholder.com/400?text=Fridge" },
    
    // --- TOYS ---
    { name: "RC Distortion Car", cat: "Toys", sub: "Remote Control", price: "¥41.80", img: "https://via.placeholder.com/400?text=RC+Car" },
    { name: "Electric Bubble Machine", cat: "Toys", sub: "Outdoor", price: "¥7.50", img: "https://via.placeholder.com/400?text=Bubbles" },
    
    // --- HOUSEHOLD ---
    { name: "Dressing Table 8060", cat: "Household", sub: "Furniture", price: "¥8.80", img: "https://via.placeholder.com/400?text=Table" },
    
    // --- CLOTHING ---
    { name: "Cotton Men's T-Shirt", cat: "Clothing", sub: "Men", price: "¥25.00", img: "https://via.placeholder.com/400?text=Shirt" }
];

function setCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    runFilters();
}

function runFilters() {
    const searchVal = document.getElementById('searchInput').value.toLowerCase();
    const grid = document.getElementById('productGrid');
    grid.innerHTML = "";
    
    let filtered = products.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(searchVal) || p.sub.toLowerCase().includes(searchVal);
        const matchesCat = (currentCategory === 'All' || p.cat === currentCategory);
        return matchesSearch && matchesCat;
    });

    const groups = filtered.reduce((acc, p) => {
        if (!acc[p.sub]) acc[p.sub] = [];
        acc[p.sub].push(p);
        return acc;
    }, {});

    for (const subHeader in groups) {
        grid.innerHTML += `<div class="sub-cat-header">${subHeader}</div>`;
        groups[subHeader].forEach(p => {
            const waLink = `https://wa.me/${BUSINESS_PHONE}?text=Inquiry: ${p.name}`;
            const mailLink = `mailto:${BUSINESS_EMAIL}?subject=Inquiry: ${p.name}`;
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.img}">
                    <div class="info">
                        <div class="item-name">${p.name}</div>
                        <div class="price">${p.price}</div>
                        <div class="contact-options">
                            <a href="${waLink}" class="btn btn-wa">WhatsApp</a>
                            <a href="${mailLink}" class="btn btn-mail">Email</a>
                        </div>
                    </div>
                </div>`;
        });
    }
}
runFilters();
</script>
</body>
</html>
