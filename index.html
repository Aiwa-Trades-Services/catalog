<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiwa Trade Services | Premium Global Sourcing</title>
    <style>
        :root {
            --primary: #001f5b;
            --gold: #b59410;
            --light-bg: #f8f9fa;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background: url('https://images.unsplash.com/photo-1578575437130-527eed3abbec?auto=format&fit=crop&q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            color: var(--primary);
            overflow-x: hidden;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-wrapper {
            animation: fadeInPage 1s ease-out;
            min-height: 100vh;
            background: rgba(248, 249, 250, 0.85);
            backdrop-filter: blur(10px);
            padding-bottom: 100px;
        }

        header {
            padding: 80px 20px 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-box {
            width: 85px; height: 85px;
            border: 3px solid var(--gold);
            background: var(--white);
            transform: rotate(45deg);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 60px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: 0.5s ease;
        }
        .logo-box:hover { transform: rotate(225deg); border-color: var(--primary); }
        .logo-box span { transform: rotate(-45deg); font-weight: 900; color: var(--primary); font-size: 22px; }

        h1 {
            font-size: clamp(24px, 6vw, 42px);
            letter-spacing: 12px;
            text-transform: uppercase;
            margin: 0 0 30px 0;
            font-weight: 900;
        }

        
        .category-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px; padding: 40px;
            max-width: 1300px; margin: 0 auto;
        }

        .cat-card {
            background: var(--glass);
            border: 1px solid rgba(0,0,0,0.08); /* Defined borders */
            border-radius: 30px; aspect-ratio: 1 / 1.1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }

        .cat-card:hover { transform: translateY(-12px); border-color: var(--gold); background: var(--white); }

        .cat-icon { font-size: 50px; margin-bottom: 10px; }
        .cat-title { font-weight: 800; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }

        /* --- PRODUCT VIEW --- */
        .product-container { max-width: 1200px; margin: 0 auto; padding: 40px; }
        .back-btn { 
            background: var(--white); color: var(--primary); border: 2px solid var(--primary);
            padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: 700;
            margin-bottom: 40px; transition: 0.3s;
        }
        .back-btn:hover { background: var(--primary); color: white; }

        .product-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
        }

        .p-card { 
            background: var(--white); border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        .p-img { height: 220px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .p-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .p-info { padding: 20px; text-align: center; }
        .p-price { color: var(--gold); font-weight: 800; font-size: 18px; margin: 10px 0; }
        
        .wa-link { 
            display: block; background: var(--primary); color: white; padding: 12px; 
            border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 14px;
        }

        .hidden { display: none !important; }

        @media (max-width: 1000px) { .category-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { .category-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header id="mainHeader">
        <div class="logo-box"><span>ATS</span></div>
        <h1>Aiwa Trade Services</h1>
    </header>

    <div id="hub" class="category-grid">
        <div class="cat-card" onclick="openCatalog('Electronics')">
            <span class="cat-icon">🔌</span>
            <span class="cat-title">Electronics</span>
        </div>
        <div class="cat-card" onclick="openCatalog('Household')">
            <span class="cat-icon">🏠</span>
            <span class="cat-title">Household</span>
        </div>
        <div class="cat-card" onclick="openCatalog('Clothing')">
            <span class="cat-icon">👕</span>
            <span class="cat-title">Clothing</span>
        </div>
        <div class="cat-card" onclick="openCatalog('Toys')">
            <span class="cat-icon">🧸</span>
            <span class="cat-title">Toys</span>
        </div>
        <div class="cat-card" onclick="openCatalog('Others')">
            <span class="cat-icon">📦</span>
            <span class="cat-title">Others</span>
        </div>
    </div>

    <div id="productView" class="product-container hidden">
        <button class="back-btn" onclick="closeCatalog()">← BACK TO CATEGORIES</button>
        <h2 id="viewTitle" style="text-align:center; margin-bottom:40px; letter-spacing:4px; text-transform:uppercase;"></h2>
        <div id="productGrid" class="product-grid"></div>
    </div>
</div>

<script>
// 1. Add 'desc' to your inventory items so there is subtext to show!
    const inventory = [
        { name: "STM32 Microchip", cat: "Electronics", desc: "High-performance industrial semiconductor.", price: "Enquire MOQ", img: "Chip1.jpg" },
        { name: "Luxury Sofa Set", cat: "Household", desc: "Italian leather with velvet finish.", price: "¥2400.00", img: "Sofa.jpg" },
        { name: "Cotton Hoodie", cat: "Clothing", desc: "100% organic heavy-weight cotton.", price: "Enquire", img: "Hoodie.jpg" },
        { name: "RC Drone Pro", cat: "Toys", desc: "4K Camera with GPS auto-return.", price: "¥120.00", img: "Drone.jpg" },
        { name: "Industrial Pump", cat: "Others", desc: "High-pressure fluid sourcing.", price: "Request Quote", img: "Pump.jpg" }
    ];
const inventory = [
    { 
        name: "STM32 Microchip", 
        cat: "Electronics", 
        desc: "High-performance chip.", 
        price: "Enquire MOQ", 
        // MAKE SURE THIS MATCHES YOUR FILENAME EXACTLY
        img: "stm32_chip.png" 
    },
    // ... add more
];
    // 2. Updated function to show that subtext
    function openCatalog(category) {
        document.getElementById('hub').classList.add('hidden');
        document.getElementById('productView').classList.remove('hidden');
        document.getElementById('viewTitle').innerText = category;
        
        const grid = document.getElementById('productGrid');
        grid.innerHTML = ""; 

        const filtered = inventory.filter(p => p.cat === category);

        if(filtered.length === 0) {
            grid.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>New arrivals coming soon.</p>";
        } else {
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="p-card">
                        <div class="p-img"><img src="${p.img}" onerror="this.src='https://placehold.co/300x300?text=Aiwa+Sourcing'"></div>
                        <div class="p-info">
                            <h3 style="margin-bottom:5px;">${p.name}</h3>
                            <p style="font-size:13px; color:#666; margin-top:0;">${p.desc}</p> 
                            <div class="p-price">${p.price}</div>
                            <a href="https://wa.me/85259813744?text=Interested in ${p.name}" class="wa-link">CONTACT AGENT</a>
                        </div>
                    </div>
                `;
            });
        }
        window.scrollTo(0,0);
    }
        
        const grid = document.getElementById('productGrid');
        grid.innerHTML = ""; // Clear old stuff

        // Filter items
        const filtered = inventory.filter(p => p.cat === category);

        if(filtered.length === 0) {
            grid.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>More products coming soon. Please contact us for custom sourcing.</p>";
        } else {
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="p-card">
                        <div class="p-img"><img src="${p.img}"></div>
                        <div class="p-info">
                            <h3>${p.name}</h3>
                            <div class="p-price">${p.price}</div>
                            <a href="https://wa.me/85259813744?text=Interested in ${p.name}" class="wa-link">CONTACT AGENT</a>
                        </div>
                    </div>
                `;
            });
        }
        window.scrollTo(0,0);
    }

    function closeCatalog() {
        document.getElementById('hub').classList.remove('hidden');
        document.getElementById('productView').classList.add('hidden');
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
