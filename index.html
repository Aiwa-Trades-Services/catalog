<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiwa Trade Services | Catalog</title>
    <style>
    :root { 
        --primary: #001f5b; 
        --gold: linear-gradient(135deg, #b59410 0%, #ffecb3 50%, #b59410 100%); 
        --gold-solid: #b59410;
        --bg: #f8f9fa; 
    }

    /* Entry Animation */
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes logoPulse {
        0% { box-shadow: 0 0 0 0 rgba(181, 148, 16, 0.4); }
        70% { box-shadow: 0 0 0 15px rgba(181, 148, 16, 0); }
        100% { box-shadow: 0 0 0 0 rgba(181, 148, 16, 0); }
    }

    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
        margin: 0; background: var(--bg); color: #1d1d1f; padding-bottom: 120px;
        overflow-x: hidden;
    }

    header { 
        background: var(--primary); padding: 60px 20px; text-align: center;
        border-bottom: 5px solid var(--gold-solid);
        animation: fadeInUp 0.8s ease-out;
    }

    /* --- ENHANCED LOGO --- */
    .ats-logo {
        width: 80px; height: 80px; background: white; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-weight: 900; font-size: 26px; color: var(--primary);
        position: relative; border: 4px solid var(--gold-solid);
        background: white;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        animation: logoPulse 2s infinite;
        margin-bottom: 15px;
    }

    /* Gold Inner Ring */
    .ats-logo::before {
        content: ""; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px;
        border: 2px solid #ffecb3; border-radius: 50%;
    }

    .brand-name { 
        font-size: 36px; font-weight: 900; color: white; letter-spacing: 6px;
        text-transform: uppercase; margin: 10px 0 25px 0;
    }

    /* --- ANIMATED SEARCH --- */
    #searchInput { 
        width: 85%; max-width: 500px; padding: 18px 30px; border-radius: 50px; 
        border: none; font-size: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #searchInput:focus { width: 95%; transform: scale(1.05); outline: none; }

    /* --- FADE-IN SECTIONS --- */
    .sub-section { 
        margin: 40px auto; max-width: 1400px; background: white;
        border-radius: 20px; padding: 30px 0;
        box-shadow: 0 5px 20px rgba(0,0,0,0.03);
        animation: fadeInUp 1s ease-out backwards;
    }

    .sub-cat-header { 
        font-size: 24px; font-weight: 900; color: var(--primary); 
        margin-left: 30px; letter-spacing: 1px; display: flex; align-items: center; gap: 20px;
    }
    .sub-cat-header::after { 
        content: ""; height: 4px; background: var(--gold); flex-grow: 1; 
        margin-right: 30px; border-radius: 10px;
    }

    .horizontal-scroll { display: flex; overflow-x: auto; gap: 30px; padding: 20px 30px; scroll-behavior: smooth; }

    /* --- PREMIUM CARD HOVER --- */
    .card { 
        min-width: 280px; max-width: 280px; background: white; border-radius: 20px; 
        border: 1px solid #eee; flex-shrink: 0; overflow: hidden;
        transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        position: relative;
    }

    .card:hover { 
        transform: translateY(-15px) scale(1.02); 
        box-shadow: 0 20px 40px rgba(0,31,91,0.15);
        border-color: var(--gold-solid);
    }

    /* Glossy overlay on hover */
    .card::before {
        content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
        transform: skewX(-25deg); transition: 0.7s; z-index: 2;
    }
    .card:hover::before { left: 150%; }

    .image-container { 
        width: 100%; height: 260px; background: #fff; display: flex; 
        align-items: center; justify-content: center; overflow: hidden;
    }

    .image-container img { 
        max-width: 90%; max-height: 90%; object-fit: contain; 
        transition: transform 0.6s ease;
    }
    .card:hover img { transform: scale(1.1); }

    .info { padding: 25px; text-align: center; background: linear-gradient(to bottom, #fff, #f9f9f9); }
    
    .price { font-size: 20px; font-weight: 900; color: var(--gold-solid); margin: 10px 0 20px 0; }

    .btn-wa { 
        display: block; background: var(--primary); color: white; padding: 14px; 
        text-decoration: none; border-radius: 12px; font-weight: 800; font-size: 14px;
        transition: 0.3s;
    }
    .btn-wa:hover { background: var(--gold-solid); transform: translateY(-2px); }

    .bottom-nav { 
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
        width: 85%; max-width: 400px; background: rgba(0, 31, 91, 0.95); 
        padding: 20px; border-radius: 100px; display: flex; justify-content: space-around; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.4); z-index: 2000; backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.1);
    }
    .nav-item { color: white; text-decoration: none; font-weight: 800; letter-spacing: 1px; }
</style>
</head>
<body>

<header>
    <div class="header-content">
        <div class="ats-logo">
            <img src="" style="display:none;"> <div class="ats-logo-text">ATS</div> 
        </div>
        <div class="brand-name">AIWA TRADE SERVICES</div>
    </div>
    <input type="text" id="searchInput" onkeyup="runFilters()" placeholder="Explore our catalog...">
</header>

<div class="filter-container">
    <button class="filter-btn active" onclick="setCategory('All', this)">ALL</button>
    <button class="filter-btn" onclick="setCategory('Clothing', this)">CLOTHING</button>
    <button class="filter-btn" onclick="setCategory('Electronics', this)">ELECTRONICS</button>
    <button class="filter-btn" onclick="setCategory('Household', this)">HOUSEHOLD</button>
    <button class="filter-btn" onclick="setCategory('Toys', this)">TOYS</button>
</div>

<div class="container" id="productGrid"></div>

<div class="bottom-nav">
    <a href="https://wa.me/85259813744" class="nav-item">💬 WHATSAPP</a>
    <a href="mailto:maintillaservices@gmail.com" class="nav-item">✉️ EMAIL</a>
</div>

<script>
let currentCategory = 'All';


const products = [
    { name: "Winter Hoodie", cat: "Clothing", sub: "Winter Wear", price: "Enquire", img: "hood1.jpg" },
    { name: "Sports Tracksuit", cat: "Clothing", sub: "Sports", price: "Enquire", img: "STS1.jpg" },
    { name: "Display Fridge", cat: "Electronics", sub: "Fridges", price: "Enquire", img: "Dp1.jpg" },
    { name: "STM32 Microchip", cat: "Electronics", sub: "Chips", price: "Enquire", img: "Chip1.jpg" },
    { name: "Dressing Table", cat: "Household", sub: "Furniture", price: "¥8.80", img: "CS.jpg" },
    { name: "Winter Blanket", cat: "Household", sub: "Bedding", price: "Enquire", img: "CS.jpg" },
    { name: "Flying Car", cat: "Toys", sub: "Cars", price: "¥41.80", img: "FC1.jpg" },
    { name: "Nerf Gun", cat: "Toys", sub: "Guns", price: "¥41.80", img: "NG1.jpg" }, 
    { name: "Electric Bubble Machine", cat: "Toys", sub: "Outdoor", price: "¥7.50", img: "Bub.jpg" },
    { name: "Barbie Doll Set", cat: "Toys", sub: "Dolls", price: "¥4.40", img: "Barbe1.jpg" }, 
    { name: "Kids Learning Chart", cat: "Toys", sub: "Education", price: "Enquire", img: "LC.jpg" }
];

function setCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    runFilters();
}

function runFilters() {
    const searchVal = document.getElementById('searchInput').value.toLowerCase();
    const mainContainer = document.getElementById('productGrid');
    mainContainer.innerHTML = "";
    
    let filtered = products.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(searchVal) || p.sub.toLowerCase().includes(searchVal);
        const matchesCat = (currentCategory === 'All' || p.cat === currentCategory);
        return matchesSearch && matchesCat;
    });

    const subGroupsOrder = [];
    const groups = filtered.reduce((acc, p) => {
        if (!acc[p.sub]) {
            acc[p.sub] = [];
            subGroupsOrder.push(p.sub);
        }
        acc[p.sub].push(p);
        return acc;
    }, {});

    subGroupsOrder.forEach(subHeader => {
        let section = document.createElement('div');
        section.className = 'sub-section';
        
        let headerHtml = `<div class="sub-cat-header">${subHeader}</div>`;
        let scrollWrapper = `<div class="horizontal-scroll">`;
        
        groups[subHeader].forEach(p => {
            const waLink = `https://wa.me/85259813744?text=Inquiry: ${p.name}`;
            scrollWrapper += `
                <div class="card">
                    <div class="image-container"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/260?text=Aiwa+Trade'"></div>
                    <div class="info">
                        <div class="item-name">${p.name}</div>
                        <div class="price">${p.price}</div>
                        <a href="${waLink}" class="btn-wa">WhatsApp Inquire</a>
                    </div>
                </div>`;
        });

        scrollWrapper += `</div>`;
        section.innerHTML = headerHtml + scrollWrapper;
        mainContainer.appendChild(section);
    });
}

window.onload = runFilters;
</script>
</body>
</html>
