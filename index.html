<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiwa Trade Services | Premium Global Sourcing</title>
    <style>
        :root {
            --primary: #001f5b;
            --gold: #b59410;
            --light-bg: #f8f9fa;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.85);
        }

        /* 1. BACKGROUND PICTURE & ANIMATION */
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background: url('https://images.unsplash.com/photo-1578575437130-527eed3abbec?auto=format&fit=crop&q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            color: var(--primary);
            overflow-x: hidden;
        }

        /* Fade-in animation for the whole page */
        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-wrapper {
            animation: fadeInPage 1s ease-out;
            min-height: 100vh;
            background: rgba(248, 249, 250, 0.8); /* Light overlay to make text readable */
            backdrop-filter: blur(8px);
        }

        /* 2. CENTERED LOGO & HEADER (FIXED SPACING) */
        header {
            padding: 80px 20px 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-box {
            width: 85px; height: 85px;
            border: 3px solid var(--gold);
            background: var(--white);
            transform: rotate(45deg);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 60px; /* FIXED: Pushes text away from logo */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: 0.5s ease;
        }
        .logo-box:hover { transform: rotate(225deg); border-color: var(--primary); }

        .logo-box span { 
            transform: rotate(-45deg); 
            font-weight: 900; color: var(--primary); font-size: 22px; 
        }

        h1 {
            font-size: clamp(24px, 6vw, 42px);
            letter-spacing: 12px;
            text-transform: uppercase;
            margin: 0 0 30px 0;
            color: var(--primary);
            font-weight: 900;
        }

        #searchInput {
            width: 90%; max-width: 550px; padding: 20px 30px;
            border-radius: 40px; border: 1px solid rgba(0,0,0,0.1);
            background: var(--white); font-size: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            outline: none; transition: 0.3s;
        }
        #searchInput:focus { transform: scale(1.02); box-shadow: 0 15px 35px rgba(181, 148, 16, 0.2); }

        /* 3. SYMMETRIC GRID WITH BORDERS */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px; padding: 40px;
            max-width: 1300px; margin: 0 auto;
        }

        .cat-card {
            background: var(--glass);
            border: 1px solid rgba(0,0,0,0.05); /* Professional Borders */
            border-radius: 30px;
            aspect-ratio: 1 / 1.1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            position: relative; overflow: hidden;
        }

        .cat-card:hover {
            transform: translateY(-15px);
            background: var(--white);
            border-color: var(--gold);
            box-shadow: 0 25px 50px rgba(0,31,91,0.1);
        }

        .cat-icon { font-size: 55px; margin-bottom: 15px; transition: 0.3s; }
        .cat-title { font-weight: 800; font-size: 15px; letter-spacing: 1.5px; text-transform: uppercase; }

        /* Interactive Subtext Animation */
        .cat-subtext {
            font-size: 12px; color: #666; padding: 0 15px;
            margin-top: 10px; text-align: center;
            opacity: 0; transform: translateY(10px); transition: 0.3s;
        }
        .cat-card:hover .cat-subtext { opacity: 1; transform: translateY(0); }

        /* RESPONSIVE FIXES */
        @media (max-width: 1024px) { .category-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 650px) { .category-grid { grid-template-columns: repeat(2, 1fr); } }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header>
        <div class="logo-box"><span>ATS</span></div>
        <h1>Aiwa Trade Services</h1>
        <input type="text" id="searchInput" placeholder="Search our global inventory...">
    </header>

    <div id="hub" class="category-grid">
        <div class="cat-card" onclick="openCat('Electronics')">
            <span class="cat-icon">🔌</span>
            <span class="cat-title">Electronics</span>
            <span class="cat-subtext">Industrial components & smart tech sourcing.</span>
        </div>

        <div class="cat-card" onclick="openCat('Household')">
            <span class="cat-icon">🏠</span>
            <span class="cat-title">Household</span>
            <span class="cat-subtext">Luxury furniture & premium appliances.</span>
        </div>

        <div class="cat-card" onclick="openCat('Clothing')">
            <span class="cat-icon">👕</span>
            <span class="cat-title">Clothing</span>
            <span class="cat-subtext">Global textile & custom apparel manufacturing.</span>
        </div>

        <div class="cat-card" onclick="openCat('Toys')">
            <span class="cat-icon">🧸</span>
            <span class="cat-title">Toys</span>
            <span class="cat-subtext">Wholesale educational sets & RC gadgets.</span>
        </div>

        <div class="cat-card" onclick="openCat('Others')">
            <span class="cat-icon">📦</span>
            <span class="cat-title">Others</span>
            <span class="cat-subtext">Bespoke procurement for niche industrial needs.</span>
        </div>
    </div>
</div>

<script>
    function openCat(cat) {
        alert("Entering " + cat + " catalog...");
        // You can add your existing product rendering logic here!
    }
</script>

</body>
</html>
