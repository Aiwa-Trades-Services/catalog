<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiwa Trade Services | Global Catalog</title>
    <style>
    :root { 
        --primary: #001f5b; 
        --gold: #b59410; 
        --bg: #fdfdfd; 
        --logo-bg: #fff;
    }
    
    body { 
        font-family: -apple-system, sans-serif; 
        margin: 0; 
        background-color: #f8f9fa;
        background-image: radial-gradient(#e1e1e1 0.3px, transparent 0.3px);
        background-size: 15px 15px;
        color: #1d1d1f; 
        padding-bottom: 120px; 
    }
    
    header { 
        background: var(--primary); 
        padding: 50px 20px; 
        text-align: center;
        border-bottom: 5px solid var(--gold);
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .header-content { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }

    .ats-logo {
        width: 70px; height: 70px; background: var(--logo-bg); border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-weight: 900; font-size: 24px; color: var(--primary);
        box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; border: 3px solid #fff;
    }

    .brand-name { font-size: 34px; font-weight: 900; color: white; margin: 0; letter-spacing: 5px; }

    #searchInput { 
        width: 85%; max-width: 500px; padding: 15px 25px; border-radius: 8px; 
        border: none; font-size: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .filter-container { 
        display: flex; justify-content: center; gap: 10px; padding: 15px; 
        background: rgba(255,255,255,0.9); border-bottom: 1px solid #eee; 
        position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(5px);
    }
    
    .filter-btn { 
        padding: 8px 20px; border: 1px solid #ddd; background: white; 
        border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 700; 
    }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    .sub-section { margin: 40px auto; max-width: 1400px; background: white; border-radius: 15px; padding: 25px 0; }

    .sub-cat-header { font-size: 22px; font-weight: 800; color: var(--primary); margin-left: 30px; display: flex; align-items: center; gap: 15px; }
    .sub-cat-header::after { content: ""; height: 3px; background: var(--gold); flex-grow: 1; margin-right: 30px; opacity: 0.5; }

    .horizontal-scroll { display: flex; overflow-x: auto; gap: 30px; padding: 20px 30px; }

    /* --- THE FIX IS HERE --- */
    .card { 
        min-width: 260px; 
        max-width: 260px; /* Forces cards to stay the same size */
        background: white; 
        border-radius: 16px; 
        box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
        transition: 0.3s;
        border: 1px solid #f0f0f0;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
    }

    .image-container { 
        width: 100%; 
        height: 250px; /* This makes the rows straight */
        background: #fff; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        overflow: hidden; 
        border-radius: 16px 16px 0 0;
    }

    .image-container img { 
        max-width: 100%; 
        max-height: 100%; 
        object-fit: contain; /* Keeps the whole product visible without cropping */
        padding: 15px; 
    }
    /* ----------------------- */

    .info { padding: 25px; text-align: center; }
    .item-name { font-size: 16px; font-weight: 700; color: #222; height: 40px; overflow: hidden; margin-bottom: 8px; }
    .price { font-size: 18px; font-weight: 800; color: var(--gold); margin-bottom: 15px; }

    .btn-wa { display: block; background: var(--primary); color: white; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: 700; }
    
    .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 450px; background: rgba(0, 31, 91, 0.9); padding: 18px; border-radius: 50px; display: flex; justify-content: space-around; z-index: 2000; backdrop-filter: blur(10px); }
    .nav-item { color: white; text-decoration: none; font-weight: 700; }
</style>
</head>
<body>

<header>
    <div class="header-content">
        <div class="ats-logo">
            <img src="" style="display:none;"> <div class="ats-logo-text">ATS</div> 
        </div>
        <div class="brand-name">AIWA TRADE SERVICES</div>
    </div>
    <input type="text" id="searchInput" onkeyup="runFilters()" placeholder="Explore our catalog...">
</header>

<div class="filter-container">
    <button class="filter-btn active" onclick="setCategory('All', this)">ALL</button>
    <button class="filter-btn" onclick="setCategory('Clothing', this)">CLOTHING</button>
    <button class="filter-btn" onclick="setCategory('Electronics', this)">ELECTRONICS</button>
    <button class="filter-btn" onclick="setCategory('Household', this)">HOUSEHOLD</button>
    <button class="filter-btn" onclick="setCategory('Toys', this)">TOYS</button>
</div>

<div class="container" id="productGrid"></div>

<div class="bottom-nav">
    <a href="https://wa.me/85259813744" class="nav-item">💬 WHATSAPP</a>
    <a href="mailto:info@aiwatrade.com" class="nav-item">✉️ EMAIL</a>
</div>

<script>
let currentCategory = 'All';


const products = [
    { name: "Winter Hoodie", cat: "Clothing", sub: "Winter Wear", price: "Enquire", img: "hood1.jpg" },
    { name: "Sports Tracksuit", cat: "Clothing", sub: "Sports", price: "Enquire", img: "STS1.jpg" },
    { name: "Display Fridge", cat: "Electronics", sub: "Fridges", price: "Enquire", img: "Dp1.jpg" },
    { name: "STM32 Microchip", cat: "Electronics", sub: "Chips", price: "Enquire", img: "Chip1.jpg" },
    { name: "Dressing Table", cat: "Household", sub: "Furniture", price: "¥8.80", img: "CS.jpg" },
    { name: "Winter Blanket", cat: "Household", sub: "Bedding", price: "Enquire", img: "CS.jpg" },
    { name: "Flying Car", cat: "Toys", sub: "Cars", price: "¥41.80", img: "FC1.jpg" },
    { name: "Nerf Gun", cat: "Toys", sub: "Guns", price: "¥41.80", img: "NG1.jpg" }, 
    { name: "Electric Bubble Machine", cat: "Toys", sub: "Outdoor", price: "¥7.50", img: "Bub.jpg" },
    { name: "Barbie Doll Set", cat: "Toys", sub: "Dolls", price: "¥4.40", img: "Barbe1.jpg" }, 
    { name: "Kids Learning Chart", cat: "Toys", sub: "Education", price: "Enquire", img: "LC.jpg" }
];

function setCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    runFilters();
}

function runFilters() {
    const searchVal = document.getElementById('searchInput').value.toLowerCase();
    const mainContainer = document.getElementById('productGrid');
    mainContainer.innerHTML = "";
    
    let filtered = products.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(searchVal) || p.sub.toLowerCase().includes(searchVal);
        const matchesCat = (currentCategory === 'All' || p.cat === currentCategory);
        return matchesSearch && matchesCat;
    });

    const subGroupsOrder = [];
    const groups = filtered.reduce((acc, p) => {
        if (!acc[p.sub]) {
            acc[p.sub] = [];
            subGroupsOrder.push(p.sub);
        }
        acc[p.sub].push(p);
        return acc;
    }, {});

    subGroupsOrder.forEach(subHeader => {
        let section = document.createElement('div');
        section.className = 'sub-section';
        
        let headerHtml = `<div class="sub-cat-header">${subHeader}</div>`;
        let scrollWrapper = `<div class="horizontal-scroll">`;
        
        groups[subHeader].forEach(p => {
            const waLink = `https://wa.me/85259813744?text=Inquiry: ${p.name}`;
            scrollWrapper += `
                <div class="card">
                    <div class="image-container"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/260?text=Aiwa+Trade'"></div>
                    <div class="info">
                        <div class="item-name">${p.name}</div>
                        <div class="price">${p.price}</div>
                        <a href="${waLink}" class="btn-wa">WhatsApp Inquire</a>
                    </div>
                </div>`;
        });

        scrollWrapper += `</div>`;
        section.innerHTML = headerHtml + scrollWrapper;
        mainContainer.appendChild(section);
    });
}

window.onload = runFilters;
</script>
</body>
</html>
